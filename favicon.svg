<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Hot pink background -->
  <rect width="100" height="100" rx="22" fill="#FF69B4"/>

  <!-- Horn (spiral) -->
  <polygon points="54,8 48,32 60,32" fill="#fff"/>
  <line x1="54" y1="10" x2="50" y2="28" stroke="#FFD1DC" stroke-width="1.5"/>
  <line x1="54" y1="10" x2="58" y2="28" stroke="#FFD1DC" stroke-width="1.5"/>

  <!-- Head -->
  <ellipse cx="50" cy="52" rx="22" ry="20" fill="#fff"/>

  <!-- Snout -->
  <ellipse cx="64" cy="62" rx="10" ry="7" fill="#fff"/>

  <!-- Eye -->
  <circle cx="56" cy="47" r="4" fill="#FF69B4"/>
  <circle cx="57" cy="46" r="1.5" fill="#fff"/>

  <!-- Nostril -->
  <ellipse cx="67" cy="65" rx="2" ry="1.5" fill="#FFB7C5"/>

  <!-- Ear -->
  <polygon points="34,38 30,24 42,34" fill="#fff"/>
  <polygon points="35,37 32,27 40,34" fill="#FFB7C5"/>

  <!-- Mane -->
  <path d="M32,36 C22,42 18,54 20,68 C24,58 26,52 30,50" fill="#FFD1DC"/>
  <path d="M30,38 C18,46 14,60 16,76 C22,64 24,56 28,54" fill="#FFB7C5" opacity="0.7"/>
</svg>
